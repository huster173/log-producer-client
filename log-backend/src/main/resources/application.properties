
spring.application.name=log-backend
spring.main.banner-mode=off
server.port=8081

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:logdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always

# Consumer config
log.consumer.queue-capacity=500000
log.consumer.batch-size=500
log.consumer.consumer-threads=4
log.consumer.max-retries=3
log.consumer.initial-backoff-ms=100

# Logging levels are configured in logback-spring.xml