
spring.application.name=log-backend
spring.main.banner-mode=off
server.port=8081

# PostgreSQL — DB_HOST defaults to localhost for local/IDE runs,
# overridden to the "postgres" service name inside docker-compose.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/logdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=loguser
spring.datasource.password=logpass

spring.sql.init.mode=always

# Consumer config
log.consumer.queue-capacity=500000
log.consumer.batch-size=500
log.consumer.consumer-threads=4
log.consumer.max-retries=3
log.consumer.initial-backoff-ms=100
log.consumer.max-batch-size=5000

# Logging levels are configured in logback-spring.xml