input {
  beats {
    port => 5044
  }
}

filter {
  # Log lines from LogstashEncoder are already JSON — parse them if not yet parsed
  if [message] and [message] =~ /^\{/ {
    json {
      source => "message"
      target => "log_data"
      skip_on_invalid_json => true
    }
  }

  # Promote nested fields to top-level for easier querying in Kibana
  if [log_data] {
    mutate {
      rename => {
        "[log_data][level]"     => "level"
        "[log_data][logger_name]" => "logger"
        "[log_data][message]"   => "log_message"
        "[log_data][service]"   => "service"
        "[log_data][thread_name]" => "thread"
      }
      remove_field => ["log_data", "message"]
    }
  }

  # BackendStatsReporter emits "type=metrics received_tps=.. inserted_tps=.. ..." once a
  # second per replica. Parse it into numeric fields so Kibana can chart TPS over time.
  if [log_message] and [log_message] =~ /^type=metrics/ {
    kv {
      source => "log_message"
      field_split => " "
      value_split => "="
      target => "metrics"
    }
    mutate {
      convert => {
        "[metrics][received_tps]"    => "integer"
        "[metrics][inserted_tps]"    => "integer"
        "[metrics][dropped_tps]"     => "integer"
        "[metrics][total_received]"  => "integer"
        "[metrics][total_inserted]"  => "integer"
        "[metrics][total_dropped]"   => "integer"
        "[metrics][total_failed]"    => "integer"
        "[metrics][queue_size]"      => "integer"
        "[metrics][queue_capacity]"  => "integer"
        "[metrics][queue_fill_pct]"  => "float"
        "[metrics][jvm_used_mb]"     => "integer"
        "[metrics][jvm_max_mb]"      => "integer"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "log-backend-%{+yyyy.MM.dd}"
  }
}
